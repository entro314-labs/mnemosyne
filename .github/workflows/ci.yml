name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Ruff (format)
        run: uv run ruff format --check src tests

      - name: Pytest
        run: uv run pytest -q

      - name: Smoke-test CLI
        run: uv run syne --help
